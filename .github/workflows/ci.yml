name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Validate tools.json
        run: node test/validate-tools.cjs
      - name: Smoke test bridge
        run: node test/smoke.cjs
      - name: Build XPI
        run: make build
